name: Build Android APK

# 코드를 푸시하거나, Actions 탭에서 수동 실행하면 빌드됩니다
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Java(JDK) 설치 — 안드로이드 빌드에 필요
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 4. 안드로이드 SDK 설치
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. npm 의존성 설치
      - name: Install dependencies
        run: npm install

      # 6. 안드로이드 플랫폼 추가 (없으면 생성)
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 7. 웹 자산을 안드로이드로 동기화
      - name: Sync Capacitor
        run: npx cap sync android

      # 7-1. GPS·네트워크 권한 주입 (AndroidManifest)
      - name: Add permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n\n    <application|' "$MANIFEST"
          fi
          cat "$MANIFEST"

      # 8. APK 빌드 (디버그 — 서명 없이 바로 설치 가능)
      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # 9. APK 업로드 (Actions 결과에서 다운로드)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
