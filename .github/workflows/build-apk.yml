name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          python3 -c "
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted=\"true\">
                  <trust-anchors>
                      <certificates src=\"system\"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>'''
          open('android/app/src/main/res/xml/network_security_config.xml','w').write(xml)
          print('network_security_config.xml 생성 완료')
          "

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "=== 원본 ==="
          cat $MANIFEST

          # networkSecurityConfig
          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name" android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
          fi

          # 위치 권한 (정밀 + 대략)
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>' "$MANIFEST"
          fi
          if ! grep -q "ACCESS_COARSE_LOCATION" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>' "$MANIFEST"
          fi

          # 인터넷 권한
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          fi

          echo "=== 수정 후 ==="
          cat $MANIFEST

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subway-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
