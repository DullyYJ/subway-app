name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add plugins to package.json & capacitor.config.json
        run: |
          # package.json에 플러그인 추가
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
          pkg.dependencies['@capacitor/local-notifications'] = '6.1.2';
          pkg.dependencies['@capacitor-community/background-geolocation'] = '1.2.26';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('package.json updated:', pkg.dependencies);
          "

          # capacitor.config.json에 플러그인 설정 추가
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('capacitor.config.json','utf8'));
          cfg.plugins = cfg.plugins || {};
          cfg.plugins['LocalNotifications'] = {
            smallIcon: 'ic_stat_subway',
            iconColor: '#0066CC',
            sound: 'default'
          };
          cfg.plugins['BackgroundGeolocation'] = {};
          fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          console.log('capacitor.config.json updated');
          "

          echo "=== package.json ==="
          cat package.json
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          python3 -c "
          xml  = '<?xml version=\"1.0\" encoding=\"utf-8\"?>\n'
          xml += '<network-security-config>\n'
          xml += '    <base-config cleartextTrafficPermitted=\"true\">\n'
          xml += '        <trust-anchors><certificates src=\"system\"/></trust-anchors>\n'
          xml += '    </base-config>\n'
          xml += '    <domain-config cleartextTrafficPermitted=\"true\">\n'
          for d in ['workers.dev','phg0643.workers.dev','swopenapi.seoul.go.kr',
                    'apis.data.go.kr','tago.go.kr','allorigins.win',
                    'corsproxy.io','codetabs.com','thingproxy.freeboard.io','news.google.com']:
              xml += f'        <domain includeSubdomains=\"true\">{d}</domain>\n'
          xml += '    </domain-config>\n'
          xml += '</network-security-config>\n'
          open('android/app/src/main/res/xml/network_security_config.xml','w').write(xml)
          print('network_security_config.xml 생성 완료')
          "

      - name: Create notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/ic_stat_subway.xml << 'SVGEOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="24dp" android:height="24dp"
            android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFF"
              android:pathData="M12,2C8,2 4,3.5 4,7v10c0,1.1 0.3,2 0.8,2.7L3,21.5L4.5,23l1.8-1.8C7,21.7 8,22 9,22h6c1,0 2-0.3 2.7-0.8L19.5,23L21,21.5l-1.8-1.8C19.7,19 20,18.1 20,17V7C20,3.5 16,2 12,2zM9,18c-0.8,0-1.5-0.7-1.5-1.5S8.2,15 9,15s1.5,0.7 1.5,1.5S9.8,18 9,18zM15,18c-0.8,0-1.5-0.7-1.5-1.5S14.2,15 15,15s1.5,0.7 1.5,1.5S15.8,18 15,18zM18,12H6V7h12v5z"/>
          </vector>
          SVGEOF

      - name: Patch AndroidManifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"

          # networkSecurityConfig
          grep -q "networkSecurityConfig" "$M" || \
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name" android:networkSecurityConfig="@xml/network_security_config"|' "$M"

          # 권한 목록
          PERMS=(
            "android.permission.INTERNET"
            "android.permission.ACCESS_FINE_LOCATION"
            "android.permission.ACCESS_COARSE_LOCATION"
            "android.permission.ACCESS_BACKGROUND_LOCATION"
            "android.permission.FOREGROUND_SERVICE"
            "android.permission.FOREGROUND_SERVICE_LOCATION"
            "android.permission.POST_NOTIFICATIONS"
            "android.permission.VIBRATE"
            "android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"
          )
          for PERM in "${PERMS[@]}"; do
            grep -q "$PERM" "$M" || \
              sed -i "/<manifest/a\\    <uses-permission android:name=\"$PERM\"/>" "$M"
          done

          # BackgroundGeolocationService 선언
          grep -q "BackgroundGeolocationService" "$M" || \
            sed -i 's|</application>|    <service android:name="com.equimaps.capacitor_background_geolocation.BackgroundGeolocationService" android:enabled="true" android:exported="false" android:foregroundServiceType="location"/>\n    </application>|' "$M"

          echo "=== 최종 AndroidManifest ==="
          cat "$M"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subway-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
