name: Deploy Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'worker/index.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Get D1 Database ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          DB_ID=$(wrangler d1 list --json 2>/dev/null | \
            python3 -c "import sys,json; dbs=json.load(sys.stdin); \
            print(next((d['uuid'] for d in dbs if d['name']=='subway-db'), ''))" \
            || echo "")
          if [ -n "$DB_ID" ]; then
            sed -i "s/c06de2e6-d6bc-401c-be32-25fde0b5f747/$DB_ID/" wrangler.toml
            echo "D1 DB ID: $DB_ID"
          fi

      - name: Create D1 tables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler d1 execute subway-db --remote --command "CREATE TABLE IF NOT EXISTS restaurants (id INTEGER PRIMARY KEY AUTOINCREMENT, station_name TEXT NOT NULL, place_id TEXT NOT NULL, place_name TEXT NOT NULL, category_name TEXT DEFAULT '', address_name TEXT DEFAULT '', road_address_name TEXT DEFAULT '', distance INTEGER DEFAULT 0, place_url TEXT DEFAULT '', lat REAL DEFAULT 0, lng REAL DEFAULT 0, updated_at INTEGER NOT NULL, UNIQUE(station_name, place_id));" || echo "테이블 이미 존재"
          wrangler d1 execute subway-db --remote --command "CREATE TABLE IF NOT EXISTS ai_messages (id INTEGER PRIMARY KEY AUTOINCREMENT, line TEXT NOT NULL, nick TEXT NOT NULL, emoji TEXT DEFAULT '🚇', msg TEXT NOT NULL, ts INTEGER NOT NULL);" || echo "테이블 이미 존재"
          wrangler d1 execute subway-db --remote --command "CREATE TABLE IF NOT EXISTS ai_daily_counter (date TEXT PRIMARY KEY, count INTEGER DEFAULT 0);" || echo "테이블 이미 존재"

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Trigger AI station master (initial run)
        run: |
          echo "AI 역무원 초기 실행..."
          sleep 3
          curl -s "https://gentle-lab-7e47subway-api.phg0643.workers.dev/admin/ai-run" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            print('결과:', d)
          except:
            print('응답:', sys.stdin.read()[:200])
          " || echo "완료"

      - name: Trigger food crawl
        run: |
          echo "맛집 수집 시작..."
          curl -s -m 60 "https://gentle-lab-7e47subway-api.phg0643.workers.dev/admin/crawl-food" || echo "완료"
